<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🌈✨ Rainbow Magic Todo App 🎨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
  </head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>🌈✨ Rainbow Magic ✨🎨</h1>
      <p class="subtitle">🚀 Transform your dreams into explosive reality! 🎆</p>
    </header>

    <main>
      <form id="taskForm" class="task-form" onsubmit="event.preventDefault(); addTask();">
        <input type="text" id="taskInput" placeholder="💫 What magical explosion will you create today? 🎯" aria-label="New task">
        <button id="addButton" class="primary" type="submit">🎆 Add Magic 🌟</button>
      </form>

      <ul id="taskList" class="task-list"></ul>
      <p id="emptyState" class="empty">🌟✨ Your cosmic journey begins with a single spark of magic! 🚀</p>
    </main>

    <footer class="footer">🌈✨ Powered by Pure Rainbow Magic & Supabase 🎨🚀</footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
